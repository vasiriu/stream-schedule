<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配信スケジュール</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .schedule-frame {
            width: 100%;
            max-width: 500px;
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
        }

        .frame-top {
            width: 100%;
            aspect-ratio: 1152 / 216; 
            background-image: url('top.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            flex-shrink: 0;
        }

        .frame-middle {
            width: 100%;
            background-image: url('lr.png');
            background-size: 100% auto;
            background-repeat: repeat-y; 
            padding: 0px 50px; 
            box-sizing: border-box;
        }

        .frame-bottom {
            width: 100%;
            aspect-ratio: 1152 / 43; 
            background-image: url('foot.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            flex-shrink: 0;
        }

        .section-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0 20px 0;
            color: #a8a8ff;
            text-decoration: underline;
        }

        #schedule-container, #poll-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .schedule-card, .poll-card {
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffffff;
            transition: transform 0.2s;
        }

        .poll-card {
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .poll-card:hover {
            transform: translateX(5px);
            background-color: rgba(255, 255, 255, 0.2);
        }

        .date-info, .poll-info {
            display: flex;
            flex-direction: column;
        }
        .date-text { font-size: 13px; color: #ddddff; margin-bottom: 4px; }
        .date-text span { font-size: 18px; font-weight: bold; color: #ffffff; margin-right: 8px; }
        .title-text { font-size: 15px; font-weight: bold; }

        .calendar-btn {
            background: none;
            text-decoration: none;
            font-size: 24px;
            transition: transform 0.2s;
        }
        .calendar-btn:hover { transform: scale(1.2); }

        #last-updated {
            margin-top: 30px;
            font-size: 11px;
            color: #8888aa;
            text-align: center;
        }

        .loading { text-align: center; padding: 20px; font-size: 14px; }
        .error-text { color: #ff8888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="schedule-frame">
        <div class="frame-top"></div>
        <div class="frame-middle">
            <div class="section-title">スケジュール</div>
            <div id="schedule-container">
                <div class="loading">読み込み中...</div>
            </div>

            <div class="section-title" style="margin-top: 40px;">アンケートL</div>
            <div id="poll-container">
                <div class="loading">読み込み中...</div>
            </div>
        </div>
        <div class="frame-bottom"></div>
    </div>

    <div id="last-updated"></div>

    <script>
        const csvUrlBase = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo5E-0zPAMe2eVFP0PWcl8hOm1qgznuQV94_M1EnoqS0_N95TyIFTurUoaC3QWITUYUQWHXfSfqTTq/pub?output=csv';
        // ★アンケート用シートのgid。前回400エラーが出たため、正しい数字に書き換えてください
        const pollCsvUrl = csvUrlBase + '&gid=204098939'; 
        const voteApiUrl = 'https://script.google.com/macros/s/AKfycbx_kwFNvHeXimdZayUctufH2o1Lbr5pHtBwYAYNMh7bT6XEs_pAHv_64aWrRJz5GF2T/exec';

        // 1日の最大投票数
        const MAX_VOTES_PER_DAY = 5;

        const monthColors = {
            "1": "rgba(200, 230, 255, 0.2)", "2": "rgba(220, 200, 255, 0.2)", "3": "rgba(255, 200, 220, 0.2)",
            "4": "rgba(255, 220, 220, 0.2)", "5": "rgba(200, 255, 200, 0.2)", "6": "rgba(200, 220, 255, 0.2)",
            "7": "rgba(200, 255, 255, 0.2)", "8": "rgba(255, 230, 180, 0.2)", "9": "rgba(255, 200, 150, 0.2)",
            "10": "rgba(255, 180, 150, 0.2)","11": "rgba(220, 200, 180, 0.2)","12": "rgba(255, 255, 200, 0.2)"
        };

        function updateDisplayTime() {
            const date = new Date();
            document.getElementById('last-updated').innerText = `データ同期日時：${date.toLocaleString()}`;
        }

        // スケジュール読み込み
        Papa.parse(csvUrlBase, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const container = document.getElementById('schedule-container');
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                
                const events = results.data.filter(row => {
                    const m = row['月'], d = row['日'];
                    if(!m || !d) return false;
                    return new Date(now.getFullYear(), m-1, d).getTime() >= todayStart;
                }).slice(0, 5);

                container.innerHTML = events.length ? '' : '<div class="loading">予定は順次追加されます</div>';
                events.forEach(row => {
                    const card = document.createElement('div');
                    card.className = 'schedule-card';
                    card.style.backgroundColor = monthColors[row['月']] || "rgba(0,0,0,0.4)";
                    const calLink = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(row['内容'])}&dates=${now.getFullYear()}${row['月'].padStart(2,'0')}${row['日'].padStart(2,'0')}T200000Z/210000Z`;
                    
                    card.innerHTML = `<div class="date-info"><div class="date-text"><span>${row['月']}/${row['日']}</span> ${row['時間']}</div><div class="title-text">${row['内容']}</div></div><a href="${calLink}" class="calendar-btn" target="_blank">📅</a>`;
                    container.appendChild(card);
                });
                updateDisplayTime();
            }
        });

        // アンケート読み込み
        Papa.parse(pollCsvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const container = document.getElementById('poll-container');
                container.innerHTML = ''; 
                
                if (!results || !results.data || results.data.length === 0) {
                    container.innerHTML = '<div class="loading">現在進行中のアンケートはありません</div>';
                    return;
                }

                results.data.forEach(row => {
                    const title = row['タイトル'] || row[Object.keys(row)[0]]; 
                    if (title && title.trim() !== "") {
                        const card = document.createElement('div');
                        card.className = 'poll-card';
                        card.innerHTML = `<div class="poll-info"><div class="title-text">${title}</div></div>`;
                        card.onclick = () => vote(title);
                        container.appendChild(card);
                    }
                });
            },
            error: function(err) {
                document.getElementById('poll-container').innerHTML = '<div class="error-text">アンケートの取得に失敗しました。gidが正しいか確認してください</div>';
            }
        });
        
        function vote(title) {
            // 連打・制限チェック
            const today = new Date().toLocaleDateString();
            const lastDate = localStorage.getItem('lastVoteDate');
            let count = parseInt(localStorage.getItem('voteCount') || '0');

            // 日付が変わっていたらリセット
            if (lastDate !== today) {
                count = 0;
                localStorage.setItem('lastVoteDate', today);
            }

            // 制限チェック
            if (count >= MAX_VOTES_PER_DAY) {
                alert('本日の投票上限（' + MAX_VOTES_PER_DAY + '回）に達しました。また明日お願いします！');
                return;
            }

            // 投票実行
            if(!voteApiUrl.includes('http')) { alert('GASの設定が必要です'); return; }
            
            fetch(`${voteApiUrl}?title=${encodeURIComponent(title)}`, { mode: 'no-cors' });
            
            // カウントを増やして保存
            count++;
            localStorage.setItem('voteCount', count);
            
            alert(title + ' に投票しました！（本日 ' + count + '/' + MAX_VOTES_PER_DAY + '回目）');
        }
    </script>
</body>
</html>
