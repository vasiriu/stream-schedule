<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配信スケジュール</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .schedule-frame {
            width: 100%;
            max-width: 500px;
            margin: 0 auto; 
        }

        .frame-top {
            height: 40px; 
            background-color: #d98b2b;
            border-radius: 20px 20px 0 0;
        }

        .frame-middle {
            background: linear-gradient(to right, #8bc34a 20px, #2a2a40 20px, #2a2a40 calc(100% - 20px), #8bc34a calc(100% - 20px));
            padding: 20px 40px; 
        }

        .frame-bottom {
            height: 40px; 
            background-color: #c05028;
            border-radius: 0 0 20px 20px;
        }

        .schedule-header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #schedule-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .schedule-card {
            background-color: rgba(0, 0, 0, 0.3); 
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffffff;
        }

        .date-info {
            display: flex;
            flex-direction: column;
        }
        .date-text {
            font-size: 14px;
            color: #ddddff;
            margin-bottom: 4px;
        }
        .date-text span {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-right: 8px;
        }
        .title-text {
            font-size: 16px;
            font-weight: bold;
        }

        .calendar-btn {
            background-color: #d98b2b;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        .calendar-btn:hover {
            background-color: #c05028;
        }

        .loading, .error-message {
            text-align: center;
            padding: 10px;
        }
        .error-message {
            color: #ff8888;
            background-color: rgba(255, 0, 0, 0.1);
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="schedule-frame">
        <div class="frame-top"></div>
        <div class="frame-middle">
            <div class="schedule-header">スケジュール</div>
            <div id="schedule-container">
                <div class="loading">スケジュールを読み込み中...</div>
            </div>
        </div>
        <div class="frame-bottom"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo5E-0zPAMe2eVFP0PWcl8hOm1qgznuQV94_M1EnoqS0_N95TyIFTurUoaC3QWITUYUQWHXfSfqTTq/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            // 空行を自動でスキップする設定を追加
            skipEmptyLines: true, 
            complete: function(results) {
                const container = document.getElementById('schedule-container');
                
                try {
                    const data = results.data;
                    const currentYear = new Date().getFullYear();

                    // データが本当に空かどうかの判定をより安全に
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="loading">現在予定されている配信はありません。</div>';
                        return;
                    }

                    // 1行目の見出し（キー）を取得して、スプレッドシートの項目名が間違っていないかチェック
                    const keys = Object.keys(data[0]);
                    if (!keys.includes('月') || !keys.includes('日') || !keys.includes('時間') || !keys.includes('内容')) {
                        throw new Error(`スプレッドシートの1行目の見出しが間違っています。現在の見出し: [${keys.join(', ')}]。「月」「日」「時間」「内容」にしてください。スペースなども入れないでください。`);
                    }

                    container.innerHTML = ''; 

                    data.forEach(row => {
                        // データが空なら安全にスキップ
                        const rawMonth = row['月'] || '';
                        const rawDay = row['日'] || '';
                        const rawTime = row['時間'] || '';
                        const rawTitle = row['内容'] || '';

                        if (!rawMonth || !rawDay || !rawTime || !rawTitle) return;

                        const month = String(rawMonth).trim();
                        const day = String(rawDay).trim();
                        const time = String(rawTime).trim();
                        const title = String(rawTitle).trim();

                        const timeMatch = time.match(/(\d{1,2}):(\d{2})/);
                        let calLink = "#";
                        
                        if (timeMatch) {
                            const hours = parseInt(timeMatch[1]);
                            const minutes = parseInt(timeMatch[2]);
                            
                            const startDate = new Date(currentYear, parseInt(month) - 1, parseInt(day), hours, minutes);
                            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);

                            const formatGCalDate = (d) => {
                                return d.getFullYear().toString() +
                                    String(d.getMonth() + 1).padStart(2, '0') +
                                    String(d.getDate()).padStart(2, '0') + 'T' +
                                    String(d.getHours()).padStart(2, '0') +
                                    String(d.getMinutes()).padStart(2, '0') + '00';
                            };

                            const startStr = formatGCalDate(startDate);
                            const endStr = formatGCalDate(endDate);
                            
                            calLink = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${startStr}/${endStr}&details=${encodeURIComponent("配信をお楽しみに！")}`;
                        }

                        const card = document.createElement('div');
                        card.className = 'schedule-card';

                        card.innerHTML = `
                            <div class="date-info">
                                <div class="date-text"><span>${month}/${day}</span> ${time}</div>
                                <div class="title-text">${title}</div>
                            </div>
                            <a href="${calLink}" class="calendar-btn" target="_blank" rel="noopener noreferrer">カレンダー追加</a>
                        `;

                        container.appendChild(card);
                    });
                } catch (e) {
                    // フリーズせずに、画面に何が原因で止まったかを表示する
                    container.innerHTML = `
                        <div class="error-message">
                            <b>内部エラーが発生しました</b><br><br>
                            ${e.message}
                        </div>
                    `;
                }
            },
            error: function(err) {
                const errorDetail = err.message || JSON.stringify(err) || "不明なエラー";
                document.getElementById('schedule-container').innerHTML = `
                    <div class="error-message">
                        <b>通信エラーが発生しました。</b><br><br>
                        【エラー詳細】<br>${errorDetail}
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
