<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配信スケジュール & アンケート</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .schedule-frame {
            width: 100%;
            max-width: 500px;
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .frame-top { width: 100%; aspect-ratio: 1152 / 216; background-image: url('top.png'); background-size: 100% 100%; background-repeat: no-repeat; }
        .frame-middle { 
            width: 100%; 
            background-image: url('lr.png'); 
            background-size: 100% auto; 
            background-repeat: repeat-y; 
            padding: 0px 50px; 
            box-sizing: border-box;
            position: relative;
        }
        .frame-bottom { width: 100%; aspect-ratio: 1152 / 43; background-image: url('foot.png'); background-size: 100% 100%; background-repeat: no-repeat; }

        .section-title { 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            margin: 10px 0 20px 0; 
            color: #a8a8ff; 
            text-decoration: underline; 
        }

        #schedule-container, #poll-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .schedule-card, .poll-card {
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            cursor: pointer;
        }

        .poll-card:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.98);
        }

        .title-text { font-size: 15px; font-weight: bold; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            display: none;
            z-index: 10000;
            border: 1px solid #a8a8ff;
        }

        #last-updated { margin-top: 30px; font-size: 11px; color: #8888aa; text-align: center; }
        .loading { text-align: center; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="schedule-frame">
        <div class="frame-top"></div>
        <div class="frame-middle">
            <div class="section-title">STREAM SCHEDULE</div>
            <div id="schedule-container"><div class="loading">読み込み中...</div></div>

            <div class="section-title" style="margin-top: 40px;">NEXT GAME POLL</div>
            <div id="poll-container"><div class="loading">読み込み中...</div></div>
        </div>
        <div class="frame-bottom"></div>
    </div>

    <div id="last-updated"></div>
    <div id="toast"></div>

    <script>
        const scheduleCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo5E-0zPAMe2eVFP0PWcl8hOm1qgznuQV94_M1EnoqS0_N95TyIFTurUoaC3QWITUYUQWHXfSfqTTq/pub?output=csv';
        const pollCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo5E-0zPAMe2eVFP0PWcl8hOm1qgznuQV94_M1EnoqS0_N95TyIFTurUoaC3QWITUYUQWHXfSfqTTq/pub?gid=204098939&output=csv';
        const voteApiUrl = 'https://script.google.com/macros/s/AKfycbx_kwFNvHeXimdZayUctufH2o1Lbr5pHtBwYAYNMh7bT6XEs_pAHv_64aWrRJz5GF2T/exec';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // まずスケジュールを読み込み、完了したらアンケートを読み込む順序に変更
        function loadData() {
            // 1. スケジュール取得
            Papa.parse(scheduleCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const container = document.getElementById('schedule-container');
                    container.innerHTML = '';
                    results.data.slice(0, 5).forEach(row => {
                        if(!row['内容']) return;
                        const card = document.createElement('div');
                        card.className = 'schedule-card';
                        card.innerHTML = `<div>${row['月']}/${row['日']} ${row['内容']}</div>`;
                        container.appendChild(card);
                    });
                    document.getElementById('last-updated').innerText = `データ同期日時：${new Date().toLocaleString()}`;
                    
                    // スケジュールが終わってからアンケートを開始
                    loadPoll();
                }
            });
        }

        function loadPoll() {
            // 2. アンケート取得
            Papa.parse(pollCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const container = document.getElementById('poll-container');
                    container.innerHTML = '';
                    results.data.forEach(row => {
                        const title = row['タイトル'] || row[Object.keys(row)[0]];
                        if (!title || title.trim() === "") return;

                        const card = document.createElement('div');
                        card.className = 'poll-card';
                        card.innerHTML = `<div class="title-text">${title}</div>`;
                        card.onclick = function() { vote(title); };
                        container.appendChild(card);
                    });
                },
                error: function() {
                    document.getElementById('poll-container').innerHTML = '<div class="loading">アンケート読み込み失敗</div>';
                }
            });
        }

        function vote(title) {
            showToast(title + ' に投票しています...');
            fetch(`${voteApiUrl}?title=${encodeURIComponent(title)}`, { mode: 'no-cors' })
            .then(() => { showToast('投票完了！'); })
            .catch(() => { showToast('送信エラー'); });
        }

        // 実行開始
        loadData();
    </script>
</body>
</html>
