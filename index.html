<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配信スケジュール</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* -----------------------------------
           3パーツ構成の枠デザイン（比率自動計算版）
           ----------------------------------- */
        .schedule-frame {
            width: 100%;
            max-width: 500px; /* ここがスマホ等での最大幅になります */
            margin: 0 auto; 
        }

        .frame-top {
            width: 100%;
            /* top.pngの比率（1152:216）を維持して絶対に潰さない */
            aspect-ratio: 1152 / 216; 
            background-image: url('top.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .frame-middle {
            width: 100%;
            background-image: url('lr.png');
            background-size: 100% auto;
            background-repeat: repeat-y; /* 縦にだけ画像を繰り返して伸ばす */
            
            /* 枠線の内側に文字が収まるように余白を調整 
               （横幅1152pxの画像に合わせて、左右の余白を多めに取っています） */
            padding: 10px 50px; 
            box-sizing: border-box; /* 余白を含めて幅を計算する設定 */
        }

        .frame-bottom {
            width: 100%;
            /* foot.pngの比率（1152:43）を維持して絶対に潰さない */
            aspect-ratio: 1152 / 43; 
            background-image: url('foot.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* -----------------------------------
           中身のデザイン
           ----------------------------------- */
        .schedule-header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #schedule-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .schedule-card {
            background-color: rgba(0, 0, 0, 0.4); 
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffffff;
        }

        .date-info {
            display: flex;
            flex-direction: column;
        }
        .date-text {
            font-size: 14px;
            color: #ddddff;
            margin-bottom: 4px;
        }
        .date-text span {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-right: 8px;
        }
        .title-text {
            font-size: 16px;
            font-weight: bold;
        }

        .calendar-btn {
            background-color: #d98b2b;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        .calendar-btn:hover {
            background-color: #c05028;
        }

        /* 最終更新日の表示スタイル */
        #last-updated {
            margin-top: 30px;
            font-size: 12px;
            color: #8888aa;
            text-align: center;
        }

        .loading, .error-message {
            text-align: center;
            padding: 10px;
        }
        .error-message {
            color: #ff8888;
            background-color: rgba(255, 0, 0, 0.1);
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="schedule-frame">
        <div class="frame-top"></div>
        <div class="frame-middle">
            <div id="schedule-container">
                <div class="loading">スケジュールを読み込み中...</div>
            </div>
        </div>
        <div class="frame-bottom"></div>
    </div>

    <div id="last-updated"></div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo5E-0zPAMe2eVFP0PWcl8hOm1qgznuQV94_M1EnoqS0_N95TyIFTurUoaC3QWITUYUQWHXfSfqTTq/pub?output=csv';

        // 最終更新日を自動表示する処理
        function displayLastUpdated() {
            const date = new Date(document.lastModified);
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            document.getElementById('last-updated').innerText = `最終更新：${y}年${m}月${d}日 ${h}:${min}`;
        }
        displayLastUpdated();

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true, 
            complete: function(results) {
                const container = document.getElementById('schedule-container');
                try {
                    const data = results.data;
                    const currentYear = new Date().getFullYear();

                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="loading">現在予定されている配信はありません。</div>';
                        return;
                    }

                    container.innerHTML = ''; 

                    data.forEach(row => {
                        const rawMonth = row['月'] || '';
                        const rawDay = row['日'] || '';
                        const rawTime = row['時間'] || '';
                        const rawTitle = row['内容'] || '';

                        if (!rawMonth || !rawDay || !rawTime || !rawTitle) return;

                        const month = String(rawMonth).trim();
                        const day = String(rawDay).trim();
                        const time = String(rawTime).trim();
                        const title = String(rawTitle).trim();

                        const timeMatch = time.match(/(\d{1,2}):(\d{2})/);
                        let calLink = "#";
                        
                        if (timeMatch) {
                            const hours = parseInt(timeMatch[1]);
                            const minutes = parseInt(timeMatch[2]);
                            const startDate = new Date(currentYear, parseInt(month) - 1, parseInt(day), hours, minutes);
                            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);

                            const formatGCalDate = (d) => {
                                return d.getFullYear().toString() +
                                    String(d.getMonth() + 1).padStart(2, '0') +
                                    String(d.getDate()).padStart(2, '0') + 'T' +
                                    String(d.getHours()).padStart(2, '0') +
                                    String(d.getMinutes()).padStart(2, '0') + '00';
                            };

                            const startStr = formatGCalDate(startDate);
                            const endStr = formatGCalDate(endDate);
                            calLink = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${startStr}/${endStr}&details=${encodeURIComponent("配信をお楽しみに！")}`;
                        }

                        const card = document.createElement('div');
                        card.className = 'schedule-card';
                        card.innerHTML = `
                            <div class="date-info">
                                <div class="date-text"><span>${month}/${day}</span> ${time}</div>
                                <div class="title-text">${title}</div>
                            </div>
                            <a href="${calLink}" class="calendar-btn" target="_blank" rel="noopener noreferrer">カレンダー追加</a>
                        `;
                        container.appendChild(card);
                    });
                } catch (e) {
                    container.innerHTML = `<div class="error-message">内部エラー: ${e.message}</div>`;
                }
            }
        });
    </script>
</body>
</html>
